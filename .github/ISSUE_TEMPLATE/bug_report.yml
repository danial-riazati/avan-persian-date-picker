name: Bug Report
description: Report a bug or unexpected behavior in Avan Persian Date Picker.
title: '[Bug]: '
labels: ['bug', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the sections below as completely as possible.

  - type: checkboxes
    id: existing-issue-check
    attributes:
      label: Checked for existing issues
      description: Please search open and closed issues before filing a new one.
      options:
        - label: I have searched the existing issues and this is not a duplicate.
          required: true

  - type: dropdown
    id: packages
    attributes:
      label: Package(s) affected
      description: Which package(s) does this bug affect?
      multiple: true
      options:
        - '@avan-persian/core'
        - '@avan-persian/react'
        - '@avan-persian/holidays'
        - '@avan-persian/themes'
        - '@avan-persian/travel'
        - other / not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of the affected package(s) are you using?
      placeholder: e.g. @avan-persian/react@0.0.0
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: Reproduction steps
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Render `<AvanCalendar ... />` with props ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages, stack traces, or screenshots if applicable.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, and framework used.
      placeholder: |
        - Browser: Chrome 126
        - OS: macOS 15
        - Framework: Next.js 15 / Vite / CRA / Remix / Astro / other
    validations:
      required: true

  - type: input
    id: repro-link
    attributes:
      label: Minimal reproduction link (optional)
      description: A link to a minimal reproduction (StackBlitz, CodeSandbox, GitHub repo, etc.) makes it much easier to fix your issue quickly.
      placeholder: https://stackblitz.com/edit/...
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Anything else that might help us understand the issue.
    validations:
      required: false
